name: mirror_skeleton
description: >-
  Auto-generated, render-tree aware shimmer skeletons for any Flutter widget.
  One-line wrap, zero layout shift, theme-synced colors, and SkeletonIgnore
  to keep brand elements visible during loading.
version: 0.2.1
homepage: https://github.com/sakarchaulagain/mirror_skeleton
repository: https://github.com/sakarchaulagain/mirror_skeleton
issue_tracker: https://github.com/sakarchaulagain/mirror_skeleton/issues
topics:
  - skeleton
  - shimmer
  - loading
  - placeholder
  - ui

environment:
  sdk: ^3.11.3
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
