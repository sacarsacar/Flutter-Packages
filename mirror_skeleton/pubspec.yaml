name: mirror_skeleton
description: >-
  Render-tree aware shimmer skeletons for Flutter. One-line wrap, zero layout
  shift, auto-detected widgets, theme-synced colors, and SkeletonIgnore for
  brand elements.
version: 0.3.0
homepage: https://github.com/sacarsacar/Flutter-Packages/tree/main/mirror_skeleton
repository: https://github.com/sacarsacar/Flutter-Packages
issue_tracker: https://github.com/sacarsacar/Flutter-Packages/issues
documentation: https://pub.dev/packages/mirror_skeleton
topics:
  - skeleton
  - shimmer
  - loading
  - placeholder
  - ui

environment:
  sdk: ^3.11.3
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
